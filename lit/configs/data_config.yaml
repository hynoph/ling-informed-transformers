# LIT Data Pipeline Configuration

paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  splits_dir: "data/splits"
  logs_dir: "logs"
  bible_xml: "data/raw/Nahuatl-NT.xml"
  slr92_dir: "data/raw/SpeechTranslation210217"
  normalized_bible: "data/processed/bible_normalized.txt"
  normalized_slr92: "data/processed/slr92_normalized.txt"
  combined_corpus: "data/processed/combined_corpus.txt"
  morfessor_model: "data/processed/morfessor.model"
  segmented_corpus: "data/processed/combined_segmented.txt"
  segmented_bible: "data/processed/bible_segmented.txt"
  segmented_slr92: "data/processed/slr92_segmented.txt"
  vocab_file: "data/processed/vocab.json"

sources:
  bible_repo_url: "https://github.com/christos-c/bible-corpus"
  slr92_url: "https://www.openslr.org/resources/92/SpeechTranslation_Nahuatl_Manifest.tgz"

normalization:
  lowercase: true
  # long_vowels: "macron" | "colon" | "double" — target representation
  long_vowel_form: "macron"
  # saltillo: "apostrophe" | "modifier_letter" — target representation
  saltillo_form: "modifier_letter"
  strip_punctuation: false
  strip_digits: true

morfessor:
  algorithm: "baseline"          # morfessor-baseline
  dampening: "types"             # frequency dampening: "none" | "types" | "tokens"
  corpusweight: 1.0              # balance between model complexity and corpus fit
  min_frequency: 1               # min word freq to include in training
  max_epochs: 4

vocabulary:
  min_morpheme_freq: 2           # morphemes appearing < N times are mapped to <UNK>
  special_tokens:
    pad: "<PAD>"
    bos: "<BOS>"
    eos: "<EOS>"
    unk: "<UNK>"

splitting:
  strategy: "within_source"      # "within_source" | "cross_source"
  # within_source: each source split 80/10/10, then merged
  # cross_source: bible→train, slr92→val+test (harder domain generalization)
  train_ratio: 0.80
  val_ratio: 0.10
  test_ratio: 0.10
  seed: 42

dataset:
  context_length: 256            # tokens per training window
  stride: 128                    # sliding window stride (overlap = context_length - stride)

dataloader:
  batch_size: 32
  num_workers: 0                 # set >0 on Linux; keep 0 on Windows to avoid spawn issues
  pin_memory: false
  shuffle_train: true

hmm:
  n_states:    16
  iterations:  20
  use_split:   "train"
  output_file: "data/splits/hmm_train.txt"

lit:
  d_model:    256
  n_heads:    4
  n_layers:   4
  d_ff:       1024
  dropout:    0.1
  lr:         3e-4
  epochs:     30
  lam_start:  1.0
  lam_end:    0.0
  span_temp_start: 2.0
  span_temp_end:   10.0